<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CarouselAI — 5-Slide Carousel Generator</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Instrument+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #06060a;
  --s1: #0e0e16;
  --s2: #16161f;
  --s3: #1e1e2a;
  --border: #252535;
  --border2: #2e2e42;
  --a1: #6c63ff;
  --a2: #ff6584;
  --a3: #43e97b;
  --a4: #f7971e;
  --text: #eeeef5;
  --muted: #5a5a72;
  --muted2: #3a3a50;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Instrument Sans', sans-serif;
  min-height: 100vh;
}

body::before {
  content:'';
  position:fixed; inset:0;
  background:
    radial-gradient(ellipse 70% 50% at 10% 0%, rgba(108,99,255,0.08) 0%, transparent 55%),
    radial-gradient(ellipse 50% 60% at 90% 100%, rgba(255,101,132,0.07) 0%, transparent 55%);
  pointer-events:none; z-index:0;
}

.wrap { max-width:1160px; margin:0 auto; padding:0 24px; position:relative; z-index:1; }

nav {
  padding:24px 0 20px;
  border-bottom:1px solid var(--border);
  margin-bottom:36px;
  display:flex; align-items:center; justify-content:space-between;
}

.brand { display:flex; align-items:center; gap:10px; }

.brand-icon {
  width:34px; height:34px;
  background: linear-gradient(135deg, var(--a1), var(--a2));
  border-radius:9px;
  display:flex; align-items:center; justify-content:center;
  font-size:1rem;
}

.brand-name {
  font-family:'Syne', sans-serif;
  font-size:1.25rem; font-weight:800;
  letter-spacing:-0.3px;
}

.brand-name span { color: var(--a1); }

.nav-badge {
  font-family:'JetBrains Mono', monospace;
  font-size:0.62rem;
  color: var(--a3);
  border:1px solid rgba(67,233,123,0.3);
  padding:3px 9px; border-radius:20px;
  letter-spacing:0.8px;
}

.layout {
  display:grid;
  grid-template-columns:340px 1fr;
  gap:24px;
  align-items:start;
}

.form-card {
  background:var(--s1);
  border:1px solid var(--border);
  border-radius:18px;
  overflow:hidden;
  position:sticky; top:24px;
}

.card-head {
  padding:16px 20px;
  border-bottom:1px solid var(--border);
  display:flex; align-items:center; gap:8px;
}

.head-dot {
  width:7px; height:7px; border-radius:50%;
  background:var(--a1);
  box-shadow:0 0 8px var(--a1);
}

.head-title {
  font-family:'Syne', sans-serif;
  font-size:0.72rem; font-weight:700;
  letter-spacing:1.8px; text-transform:uppercase;
  color:var(--muted);
}

.card-body { padding:20px; }

.field { margin-bottom:16px; }

label {
  display:block;
  font-size:0.68rem; font-weight:600;
  letter-spacing:1.2px; text-transform:uppercase;
  color:var(--muted);
  margin-bottom:7px;
}

input, textarea, select {
  width:100%;
  background:var(--s2);
  border:1px solid var(--border2);
  border-radius:10px;
  color:var(--text);
  font-family:'Instrument Sans', sans-serif;
  font-size:0.88rem;
  padding:10px 13px;
  outline:none;
  transition:border-color 0.2s, box-shadow 0.2s;
  resize:none;
}

input:focus, textarea:focus, select:focus {
  border-color:var(--a1);
  box-shadow:0 0 0 3px rgba(108,99,255,0.13);
}

textarea { height:80px; line-height:1.55; }
select option { background:var(--s2); }

.style-grid {
  display:grid; grid-template-columns:1fr 1fr; gap:7px;
}

.style-chip {
  padding:8px 10px;
  border:1px solid var(--border2);
  border-radius:9px;
  font-size:0.75rem; font-weight:500;
  cursor:pointer; text-align:center;
  color:var(--muted);
  transition:all 0.15s;
  line-height:1.3;
}

.style-chip:hover { border-color:var(--a1); color:var(--a1); }
.style-chip.active {
  border-color:var(--a1);
  background:rgba(108,99,255,0.12);
  color:var(--a1);
}

.daily-row {
  display:flex; align-items:center; justify-content:space-between;
  background:var(--s2);
  border:1px solid var(--border2);
  border-radius:10px;
  padding:11px 13px;
  margin-bottom:16px;
  cursor:pointer;
}

.daily-label { font-size:0.83rem; font-weight:500; }
.daily-sub { font-size:0.7rem; color:var(--muted); margin-top:2px; }

.toggle {
  width:40px; height:22px;
  background:var(--border2);
  border-radius:11px;
  position:relative;
  transition:background 0.2s;
  flex-shrink:0;
}

.toggle.on { background:var(--a1); }

.toggle::after {
  content:'';
  position:absolute;
  width:16px; height:16px;
  border-radius:50%;
  background:white;
  top:3px; left:3px;
  transition:transform 0.2s;
}

.toggle.on::after { transform:translateX(18px); }

.posts-row {
  display:flex; align-items:center; gap:8px; margin-bottom:16px;
}

.posts-label { font-size:0.83rem; flex:1; }
.count-btn {
  width:30px; height:30px;
  background:var(--s2); border:1px solid var(--border2);
  border-radius:7px; color:var(--text);
  font-size:1rem; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  transition:all 0.15s;
}
.count-btn:hover { border-color:var(--a1); color:var(--a1); }
.count-display {
  font-family:'JetBrains Mono', monospace;
  font-size:1rem; font-weight:500;
  min-width:28px; text-align:center;
  color:var(--a1);
}

.gen-btn {
  width:100%; padding:13px;
  background:linear-gradient(135deg, var(--a1), #9b59b6);
  border:none; border-radius:12px;
  color:white;
  font-family:'Syne', sans-serif;
  font-size:0.95rem; font-weight:700;
  letter-spacing:1px;
  cursor:pointer;
  transition:all 0.2s;
  position:relative; overflow:hidden;
}

.gen-btn::after {
  content:'';
  position:absolute; inset:0;
  background:linear-gradient(135deg, rgba(255,255,255,0.1), transparent);
  opacity:0; transition:opacity 0.2s;
}

.gen-btn:hover::after { opacity:1; }
.gen-btn:hover { transform:translateY(-1px); box-shadow:0 8px 28px rgba(108,99,255,0.4); }
.gen-btn:disabled { opacity:0.45; cursor:not-allowed; transform:none; box-shadow:none; }

.right-panel {
  display:flex; flex-direction:column; gap:20px;
}

.post-block {
  background:var(--s1);
  border:1px solid var(--border);
  border-radius:18px;
  overflow:hidden;
  animation:fadeUp 0.45s ease forwards;
}

@keyframes fadeUp {
  from { opacity:0; transform:translateY(20px); }
  to   { opacity:1; transform:translateY(0); }
}

.post-block-head {
  padding:14px 20px;
  border-bottom:1px solid var(--border);
  display:flex; align-items:center; justify-content:space-between;
}

.post-num {
  font-family:'JetBrains Mono', monospace;
  font-size:0.7rem; color:var(--muted);
}

.post-topic-tag {
  font-size:0.78rem; font-weight:600;
  color:var(--a1);
  background:rgba(108,99,255,0.1);
  border:1px solid rgba(108,99,255,0.25);
  padding:4px 10px; border-radius:20px;
}

.post-block-body {
  padding:20px;
  display:grid;
  grid-template-columns:1fr 280px;
  gap:20px;
}

.slides-label, .copy-label {
  font-size:0.65rem; font-weight:700;
  letter-spacing:1.5px; text-transform:uppercase;
  color:var(--muted);
  margin-bottom:10px;
}

.slides-row {
  display:flex; gap:8px; flex-wrap:wrap;
  margin-bottom:14px;
}

.slide-card {
  width:80px; height:80px;
  border-radius:10px; overflow:hidden;
  cursor:pointer;
  border:2px solid transparent;
  transition:all 0.15s;
  flex-shrink:0;
}

.slide-card:hover { border-color:rgba(108,99,255,0.4); }
.slide-card.active-slide { border-color:var(--a1); box-shadow:0 0 12px rgba(108,99,255,0.4); }

.slide-inner {
  width:100%; height:100%;
  padding:7px;
  display:flex; flex-direction:column;
  justify-content:center;
}

.slide-page-num {
  font-family:'JetBrains Mono', monospace;
  font-size:0.55rem;
  opacity:0.7;
}

.slide-title-preview {
  font-size:0.55rem; font-weight:700;
  line-height:1.3;
  margin-top:3px;
  overflow:hidden;
  display:-webkit-box;
  -webkit-line-clamp:2;
  -webkit-box-orient:vertical;
}

.slide-body-preview {
  font-size:0.48rem;
  opacity:0.7;
  margin-top:2px;
  overflow:hidden;
  display:-webkit-box;
  -webkit-line-clamp:2;
  -webkit-box-orient:vertical;
}

.big-slide {
  border-radius:14px;
  padding:24px 20px;
  min-height:200px;
  display:flex; flex-direction:column;
  gap:8px;
  position:relative;
}

.big-slide-num {
  font-family:'JetBrains Mono', monospace;
  font-size:0.65rem; opacity:0.7;
}

.big-slide-emoji { font-size:1.6rem; }

.big-slide-title {
  font-family:'Syne', sans-serif;
  font-size:1.05rem; font-weight:800;
  line-height:1.3;
}

.big-slide-body {
  font-size:0.82rem; line-height:1.6;
  opacity:0.85;
  flex:1;
}

.big-slide-cta {
  display:inline-block;
  font-size:0.72rem; font-weight:600;
  padding:6px 14px; border-radius:20px;
  margin-top:4px;
  align-self:flex-start;
}

.big-slide-page {
  font-family:'JetBrains Mono', monospace;
  font-size:0.6rem;
  opacity:0.5;
  margin-top:auto;
}

.caption-box {
  background:var(--s2);
  border:1px solid var(--border2);
  border-radius:10px;
  padding:12px;
  font-size:0.8rem;
  line-height:1.6;
  white-space:pre-line;
  margin-bottom:10px;
}

.hashtag-box {
  background:var(--s2);
  border:1px solid var(--border2);
  border-radius:10px;
  padding:12px;
  font-size:0.72rem;
  color:var(--a1);
  line-height:1.8;
  margin-bottom:12px;
  word-break:break-word;
}

.copy-post-btn {
  width:100%; padding:10px;
  background:transparent;
  border:1px solid var(--border2);
  border-radius:9px;
  color:var(--muted);
  font-family:'Syne', sans-serif;
  font-size:0.72rem; font-weight:700;
  letter-spacing:1px;
  cursor:pointer;
  transition:all 0.2s;
}

.copy-post-btn:hover {
  border-color:var(--a1); color:var(--a1);
}

.empty {
  background:var(--s1);
  border:1px solid var(--border);
  border-radius:18px;
  padding:60px 30px;
  text-align:center;
}

.empty-icon { font-size:2.5rem; margin-bottom:14px; opacity:0.3; }
.empty-msg { color:var(--muted); font-size:0.9rem; line-height:1.6; max-width:280px; margin:0 auto; }

.loading-wrap {
  background:var(--s1);
  border:1px solid var(--border);
  border-radius:18px;
  padding:60px 30px;
  text-align:center;
}

.loader {
  display:flex; justify-content:center; gap:8px; margin-bottom:20px;
}

.loader span {
  width:10px; height:10px; border-radius:50%;
  background:var(--a1);
  animation:bounce 1.2s infinite ease-in-out;
}

.loader span:nth-child(2) { animation-delay:0.2s; background:var(--a2); }
.loader span:nth-child(3) { animation-delay:0.4s; background:var(--a3); }

@keyframes bounce {
  0%,100% { transform:translateY(0); opacity:0.4; }
  50% { transform:translateY(-12px); opacity:1; }
}

.loading-msg {
  font-family:'Syne', sans-serif;
  font-size:0.95rem; font-weight:700;
  margin-bottom:20px;
  color:var(--a1);
}

.loading-steps { display:flex; flex-direction:column; gap:6px; align-items:center; }

.loading-step {
  font-size:0.78rem; color:var(--muted2);
  transition:all 0.3s;
  padding:4px 12px; border-radius:20px;
}

.loading-step.active { color:var(--text); background:var(--s2); }
.loading-step.done { color:var(--a3); }
.loading-step.done::before { content:'✓ '; }

@media(max-width:860px) {
  .layout { grid-template-columns:1fr; }
  .form-card { position:static; }
  .post-block-body { grid-template-columns:1fr; }
}
</style>
</head>
<body>
<div class="wrap">
  <nav>
    <div class="brand">
      <div class="brand-icon">⧉</div>
      <div class="brand-name">Carousel<span>AI</span></div>
    </div>
    <div class="nav-badge">AI POWERED</div>
  </nav>

  <div class="layout">
    <!-- FORM -->
    <div class="form-card">
      <div class="card-head">
        <div class="head-dot"></div>
        <div class="head-title">Configure</div>
      </div>
      <div class="card-body">

        <div class="field">
          <label>Business Name</label>
          <input type="text" id="bizName" placeholder="e.g. Nova Marketing Co." />
        </div>

        <div class="field">
          <label>Services / Products *</label>
          <textarea id="services" placeholder="e.g. Social media management, content creation, paid ads for e-commerce brands"></textarea>
        </div>

        <div class="field">
          <label>Industry</label>
          <select id="industry">
            <option>Marketing & Advertising</option>
            <option>E-commerce & Retail</option>
            <option>Health & Wellness</option>
            <option>Finance & Investing</option>
            <option>Real Estate</option>
            <option>SaaS & Tech</option>
            <option>Education & Coaching</option>
            <option>Food & Beverage</option>
            <option>Fashion & Beauty</option>
            <option>Travel & Hospitality</option>
            <option>Other</option>
          </select>
        </div>

        <div class="field">
          <label>Target Platform</label>
          <select id="platform">
            <option>Instagram</option>
            <option>LinkedIn</option>
            <option>TikTok</option>
            <option>Facebook</option>
            <option>Pinterest</option>
          </select>
        </div>

        <div class="field">
          <label>Content Style</label>
          <div class="style-grid">
            <div class="style-chip active" onclick="pickStyle(this)">📚 Educational</div>
            <div class="style-chip" onclick="pickStyle(this)">🔥 Motivational</div>
            <div class="style-chip" onclick="pickStyle(this)">📋 Tips & Tricks</div>
            <div class="style-chip" onclick="pickStyle(this)">📖 Storytelling</div>
            <div class="style-chip" onclick="pickStyle(this)">🔍 Case Study</div>
            <div class="style-chip" onclick="pickStyle(this)">❓ Myth-Busting</div>
          </div>
        </div>

        <div class="daily-row" onclick="toggleDaily()">
          <div>
            <div class="daily-label">📅 Batch Mode</div>
            <div class="daily-sub">Generate multiple carousels at once</div>
          </div>
          <div class="toggle" id="dailyToggle"></div>
        </div>

        <div class="posts-row" id="postsRow" style="display:none">
          <div class="posts-label">Number of carousels</div>
          <button class="count-btn" onclick="changeCount(-1)">−</button>
          <div class="count-display" id="countDisplay">5</div>
          <button class="count-btn" onclick="changeCount(1)">+</button>
        </div>

        <button class="gen-btn" id="genBtn" onclick="generate()">⧉ GENERATE CAROUSELS</button>
      </div>
    </div>

    <!-- RIGHT -->
    <div class="right-panel" id="rightPanel">
      <div class="empty">
        <div class="empty-icon">⧉</div>
        <div class="empty-msg">Enter your business details and generate ready-to-post carousels</div>
      </div>
    </div>
  </div>
</div>

<script>
let selectedStyle = 'Educational';
let dailyMode = false;
let postsCount = 5;
let activeSlides = {};

function pickStyle(el) {
  document.querySelectorAll('.style-chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  selectedStyle = el.textContent.replace(/^[^\w]+/, '').trim();
}

function toggleDaily() {
  dailyMode = !dailyMode;
  document.getElementById('dailyToggle').classList.toggle('on', dailyMode);
  document.getElementById('postsRow').style.display = dailyMode ? 'flex' : 'none';
}

function changeCount(d) {
  postsCount = Math.min(7, Math.max(1, postsCount + d));
  document.getElementById('countDisplay').textContent = postsCount;
}

const themes = [
  { bg: 'linear-gradient(135deg,#1a1a2e,#16213e)', text: '#e0e0ff', accent: '#6c63ff' },
  { bg: 'linear-gradient(135deg,#0f2027,#203a43,#2c5364)', text: '#e0f7fa', accent: '#43e97b' },
  { bg: 'linear-gradient(135deg,#1a0533,#2d0b5e)', text: '#f3e5f5', accent: '#ff6584' },
  { bg: 'linear-gradient(135deg,#0d1b0d,#1a3a1a)', text: '#e8f5e9', accent: '#69f0ae' },
  { bg: 'linear-gradient(135deg,#1c0a00,#3d1a00)', text: '#fff3e0', accent: '#f7971e' },
];

function getTheme(i) { return themes[i % themes.length]; }

function buildSlideHTML(slide, themeIdx, slideNum, total, big = false) {
  const t = getTheme(themeIdx);
  if (big) {
    return `
      <div class="big-slide" style="background:${t.bg}; color:${t.text};">
        <div class="big-slide-num" style="color:${t.accent}">${slideNum}/${total}</div>
        <div class="big-slide-emoji">${slide.emoji || '✦'}</div>
        <div class="big-slide-title">${slide.title}</div>
        <div class="big-slide-body">${slide.body}</div>
        ${slide.cta ? `<div class="big-slide-cta" style="border:1px solid ${t.accent};color:${t.accent}">${slide.cta}</div>` : ''}
        <div class="big-slide-page" style="color:${t.accent}">Slide ${slideNum}</div>
      </div>`;
  } else {
    return `
      <div class="slide-inner" style="background:${t.bg}; color:${t.text};">
        <div class="slide-page-num" style="color:${t.accent}">${slideNum}</div>
        <div style="font-size:1rem;margin-bottom:4px">${slide.emoji || '✦'}</div>
        <div class="slide-title-preview">${slide.title}</div>
        <div class="slide-body-preview">${slide.body.substring(0,40)}...</div>
      </div>`;
  }
}

function switchSlide(postIdx, slideIdx, slides, themeIdx) {
  activeSlides[postIdx] = slideIdx;
  document.querySelectorAll(`#slides-row-${postIdx} .slide-card`).forEach((c, i) => {
    c.classList.toggle('active-slide', i === slideIdx);
  });
  const bigEl = document.getElementById(`big-slide-${postIdx}`);
  bigEl.innerHTML = buildSlideHTML(slides[slideIdx], themeIdx, slideIdx + 1, slides.length, true);
}

function renderPosts(posts) {
  const panel = document.getElementById('rightPanel');
  panel.innerHTML = '';

  posts.forEach((post, pi) => {
    const themeIdx = pi;
    activeSlides[pi] = 0;
    const block = document.createElement('div');
    block.className = 'post-block';
    block.style.animationDelay = `${pi * 0.1}s`;

    const thumbsHTML = post.slides.map((sl, si) => `
      <div class="slide-card ${si === 0 ? 'active-slide' : ''}" onclick="switchSlide(${pi},${si},window.posts[${pi}].slides,${themeIdx})">
        ${buildSlideHTML(sl, themeIdx, si + 1, post.slides.length, false)}
      </div>`).join('');

    block.innerHTML = `
      <div class="post-block-head">
        <div class="post-num">Post ${pi + 1} of ${posts.length}</div>
        <div class="post-topic-tag">${post.topic}</div>
      </div>
      <div class="post-block-body">
        <div class="slides-area">
          <div class="slides-label">5 Slides — Click to preview</div>
          <div class="slides-row" id="slides-row-${pi}">${thumbsHTML}</div>
          <div id="big-slide-${pi}">
            ${buildSlideHTML(post.slides[0], themeIdx, 1, post.slides.length, true)}
          </div>
        </div>
        <div class="copy-area">
          <div class="copy-label">Caption + Hashtags</div>
          <div class="caption-box">${post.caption}</div>
          <div class="hashtag-box">${post.hashtags}</div>
          <button class="copy-post-btn" onclick="copyPost(${pi})">⊕ COPY CAPTION</button>
        </div>
      </div>`;

    panel.appendChild(block);
  });

  window.posts = posts;
}

function copyPost(idx) {
  const p = window.posts[idx];
  navigator.clipboard.writeText(`${p.caption}\n\n${p.hashtags}`).then(() => {
    const btns = document.querySelectorAll('.copy-post-btn');
    btns[idx].textContent = '✓ COPIED!';
    btns[idx].style.color = 'var(--a3)';
    btns[idx].style.borderColor = 'var(--a3)';
    setTimeout(() => {
      btns[idx].textContent = '⊕ COPY CAPTION';
      btns[idx].style.color = '';
      btns[idx].style.borderColor = '';
    }, 2000);
  });
}

function showLoading(n) {
  const steps = [
    'Analyzing your business...',
    'Crafting carousel topics...',
    'Writing slide content...',
    'Generating captions...',
    'Adding hashtags...'
  ];
  const panel = document.getElementById('rightPanel');
  panel.innerHTML = `
    <div class="loading-wrap">
      <div class="loader"><span></span><span></span><span></span></div>
      <div class="loading-msg">Building ${n} carousel${n>1?'s':''}...</div>
      <div class="loading-steps" id="loadSteps">
        ${steps.map((s,i) => `<div class="loading-step" id="lstep${i}">${s}</div>`).join('')}
      </div>
    </div>`;

  let si = 0;
  const interval = setInterval(() => {
    if (si > 0) document.getElementById(`lstep${si-1}`)?.classList.replace('active','done');
    const el = document.getElementById(`lstep${si}`);
    if (el) el.classList.add('active');
    si++;
    if (si >= steps.length) clearInterval(interval);
  }, 600);
}

async function generate() {
  const biz = document.getElementById('bizName').value.trim();
  const services = document.getElementById('services').value.trim();
  const industry = document.getElementById('industry').value;
  const platform = document.getElementById('platform').value;
  const n = dailyMode ? postsCount : 1;

  if (!services) {
    document.getElementById('services').focus();
    document.getElementById('services').style.borderColor = 'var(--a2)';
    setTimeout(() => document.getElementById('services').style.borderColor = '', 1500);
    return;
  }

  const btn = document.getElementById('genBtn');
  btn.disabled = true;
  btn.textContent = 'GENERATING...';
  showLoading(n);

  const prompt = `You are a viral social media content expert specializing in carousel posts.

Business: ${biz || 'My Business'}
Services: ${services}
Industry: ${industry}
Platform: ${platform}
Style: ${selectedStyle}
Number of carousels to generate: ${n}

Generate ${n} unique carousel post(s). Each carousel has exactly 5 slides.

Return ONLY a valid JSON array (no markdown, no backticks, no explanation):
[
  {
    "topic": "short topic title (3-5 words)",
    "slides": [
      {
        "emoji": "one relevant emoji",
        "title": "slide headline (max 8 words, punchy)",
        "body": "2-3 lines of content for this slide (engaging, value-packed)",
        "cta": "optional call to action (only for slide 1 hook and slide 5 closing)"
      }
    ],
    "caption": "Instagram-style caption for this carousel (2-3 sentences, engaging, with line breaks)",
    "hashtags": "12-15 hashtags as a single string"
  }
]

Slide structure rules:
- Slide 1: Hook / bold opening claim (CTA: "Swipe to learn more →")
- Slide 2: Problem or context
- Slide 3: Key insight or tip 1
- Slide 4: Key insight or tip 2
- Slide 5: Summary + strong CTA (e.g., "Follow for more", "DM us", "Link in bio")

Make each carousel topic DIFFERENT from the others. Make content highly specific to the business.`;

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': window.ANTHROPIC_API_KEY || '',
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 4000,
        messages: [{ role: 'user', content: prompt }]
      })
    });

    if (!res.ok) {
      const err = await res.json();
      throw new Error(err.error?.message || `HTTP ${res.status}`);
    }

    const data = await res.json();
    const raw = data.content.map(i => i.text || '').join('');
    const clean = raw.replace(/```json|```/g, '').trim();
    const posts = JSON.parse(clean);
    renderPosts(posts);

  } catch(err) {
    document.getElementById('rightPanel').innerHTML = `
      <div class="empty">
        <div class="empty-icon">⚠</div>
        <div class="empty-msg" style="color:var(--a2)">
          <strong>Error:</strong> ${err.message}<br><br>
          Make sure your API key is set correctly.<br>
          Open the browser console for details.
        </div>
      </div>`;
    console.error('Carousel generation error:', err);
  }

  btn.disabled = false;
  btn.textContent = '⧉ GENERATE CAROUSELS';
}
