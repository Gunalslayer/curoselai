<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CarouselAI — 5-Slide Carousel Generator</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #06060a; color: #eeeef5; font-family: 'Inter', sans-serif; min-height: 100vh; }
  ::-webkit-scrollbar { width: 6px; } 
  ::-webkit-scrollbar-track { background: #0e0e16; }
  ::-webkit-scrollbar-thumb { background: #2e2e42; border-radius: 3px; }
  @keyframes bounce {
    0%,100% { transform: translateY(0); opacity: 0.4; }
    50% { transform: translateY(-10px); opacity: 1; }
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .fadeUp { animation: fadeUp 0.4s ease forwards; }
  select, input, textarea { -webkit-appearance: none; appearance: none; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect } = React;

const API_KEY = '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';

const THEMES = [
  { bg: 'linear-gradient(135deg,#1a1a2e,#16213e)', text: '#e0e0ff', accent: '#6c63ff' },
  { bg: 'linear-gradient(135deg,#0f2027,#203a43,#2c5364)', text: '#e0f7fa', accent: '#43e97b' },
  { bg: 'linear-gradient(135deg,#1a0533,#2d0b5e)', text: '#f3e5f5', accent: '#ff6584' },
  { bg: 'linear-gradient(135deg,#0d1b0d,#1a3a1a)', text: '#e8f5e9', accent: '#69f0ae' },
  { bg: 'linear-gradient(135deg,#1c0a00,#3d1a00)', text: '#fff3e0', accent: '#f7971e' },
];

const STYLES = ['📚 Educational','🔥 Motivational','📋 Tips & Tricks','📖 Storytelling','🔍 Case Study','❓ Myth-Busting'];
const INDUSTRIES = ['Marketing & Advertising','E-commerce & Retail','Health & Wellness','Finance & Investing','Real Estate','SaaS & Tech','Education & Coaching','Food & Beverage','Fashion & Beauty','Travel & Hospitality','Other'];
const PLATFORMS = ['Instagram','LinkedIn','TikTok','Facebook','Pinterest'];
const LOADING_STEPS = ['Analyzing your business...','Crafting carousel topics...','Writing slide content...','Generating captions...','Adding hashtags...'];

const inp = (extra) => ({
  width: '100%', background: '#16161f', border: '1px solid #2e2e42',
  borderRadius: 10, color: '#eeeef5', fontSize: '0.88rem',
  padding: '10px 13px', outline: 'none', fontFamily: 'Inter, sans-serif',
  boxSizing: 'border-box', ...extra
});

export default function App() {
  const [bizName, setBizName]     = useState('');
  const [services, setServices]   = useState('');
  const [industry, setIndustry]   = useState(INDUSTRIES[0]);
  const [platform, setPlatform]   = useState(PLATFORMS[0]);
  const [style, setStyle]         = useState(STYLES[0]);
  const [batch, setBatch]         = useState(false);
  const [count, setCount]         = useState(3);
  const [loading, setLoading]     = useState(false);
  const [loadStep, setLoadStep]   = useState(0);
  const [posts, setPosts]         = useState([]);
  const [error, setError]         = useState('');
  const [activeSlides, setActive] = useState({});
  const [copied, setCopied]       = useState({});
  const [svcErr, setSvcErr]       = useState(false);
  const isMobile = window.innerWidth < 720;

  async function generate() {
    if (!services.trim()) { setSvcErr(true); setTimeout(()=>setSvcErr(false),1500); return; }
    const n = batch ? count : 1;
    setLoading(true); setError(''); setPosts([]); setLoadStep(0);

    const iv = setInterval(()=> setLoadStep(s => s < LOADING_STEPS.length-1 ? s+1 : s), 700);

    const prompt = `You are a viral social media content expert specializing in carousel posts.
Business: ${bizName||'My Business'}
Services: ${services}
Industry: ${industry}
Platform: ${platform}
Style: ${style.replace(/^[^\w]+/,'').trim()}
Number of carousels: ${n}

Generate ${n} unique carousel post(s), each with exactly 5 slides.
Return ONLY a valid JSON array — no markdown, no backticks, no explanation:
[{"topic":"3-5 word title","slides":[{"emoji":"1 emoji","title":"max 8 word headline","body":"2-3 lines of engaging content","cta":"only for slide 1 and slide 5"}],"caption":"2-3 sentence Instagram caption","hashtags":"12-15 hashtags as one string"}]

Slide structure:
- Slide 1: Hook (cta: "Swipe to learn more →")
- Slide 2: Problem/context (no cta)
- Slide 3: Key insight 1 (no cta)
- Slide 4: Key insight 2 (no cta)
- Slide 5: Summary + strong CTA (e.g. "Follow for more" or "DM us")

Each carousel must have a DIFFERENT topic. Make content highly specific to the business.`;

    try {
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': API_KEY,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true'
        },
        body: JSON.stringify({ model:'claude-sonnet-4-20250514', max_tokens:4000, messages:[{role:'user',content:prompt}] })
      });
      clearInterval(iv);
      if (!res.ok) { const e=await res.json(); throw new Error(e.error?.message||`HTTP ${res.status}`); }
      const data = await res.json();
      const raw  = data.content.map(i=>i.text||'').join('');
      const clean = raw.replace(/```json|```/g,'').trim();
      const parsed = JSON.parse(clean);
      setPosts(parsed);
      setActive(Object.fromEntries(parsed.map((_,i)=>[i,0])));
    } catch(e) {
      clearInterval(iv);
      setError('Error: ' + e.message);
    }
    setLoading(false);
  }

  function copyCaption(idx) {
    const p = posts[idx];
    navigator.clipboard.writeText(`${p.caption}\n\n${p.hashtags}`);
    setCopied(c=>({...c,[idx]:true}));
    setTimeout(()=>setCopied(c=>({...c,[idx]:false})),2000);
  }

  const lbl = {display:'block',fontSize:'0.64rem',fontWeight:700,letterSpacing:'1.2px',textTransform:'uppercase',color:'#5a5a72',marginBottom:6};

  return (
    <div style={{minHeight:'100vh'}}>
      {/* NAV */}
      <div style={{borderBottom:'1px solid #252535',padding:'18px 24px',display:'flex',alignItems:'center',justifyContent:'space-between',position:'sticky',top:0,background:'#06060a',zIndex:100}}>
        <div style={{display:'flex',alignItems:'center',gap:10}}>
          <div style={{width:34,height:34,background:'linear-gradient(135deg,#6c63ff,#ff6584)',borderRadius:9,display:'flex',alignItems:'center',justifyContent:'center',fontSize:'1rem'}}>⧉</div>
          <span style={{fontSize:'1.2rem',fontWeight:800,fontFamily:'Syne,sans-serif'}}>Carousel<span style={{color:'#6c63ff'}}>AI</span></span>
        </div>
        <span style={{fontSize:'0.6rem',color:'#43e97b',border:'1px solid rgba(67,233,123,0.3)',padding:'3px 10px',borderRadius:20,letterSpacing:'0.8px'}}>AI POWERED</span>
      </div>

      {/* LAYOUT */}
      <div style={{maxWidth:1120,margin:'0 auto',padding:'24px 16px',display:'grid',gridTemplateColumns:isMobile?'1fr':'300px 1fr',gap:20,alignItems:'start'}}>

        {/* ── FORM ── */}
        <div style={{background:'#0e0e16',border:'1px solid #252535',borderRadius:18,overflow:'hidden',position:isMobile?'static':'sticky',top:74}}>
          <div style={{padding:'13px 18px',borderBottom:'1px solid #252535',display:'flex',alignItems:'center',gap:8}}>
            <div style={{width:7,height:7,borderRadius:'50%',background:'#6c63ff',boxShadow:'0 0 8px #6c63ff'}}/>
            <span style={{fontSize:'0.65rem',fontWeight:700,letterSpacing:'1.8px',textTransform:'uppercase',color:'#5a5a72'}}>Configure</span>
          </div>
          <div style={{padding:18,display:'flex',flexDirection:'column',gap:14}}>

            <div><label style={lbl}>Business Name</label>
              <input style={inp()} value={bizName} onChange={e=>setBizName(e.target.value)} placeholder="e.g. Nova Marketing Co."/>
            </div>

            <div><label style={lbl}>Services / Products *</label>
              <textarea style={inp({resize:'none',height:72,lineHeight:1.5,borderColor:svcErr?'#ff6584':'#2e2e42'})}
                value={services} onChange={e=>setServices(e.target.value)}
                placeholder="e.g. Social media management, content creation..."/>
            </div>

            <div><label style={lbl}>Industry</label>
              <select style={inp()} value={industry} onChange={e=>setIndustry(e.target.value)}>
                {INDUSTRIES.map(i=><option key={i}>{i}</option>)}
              </select>
            </div>

            <div><label style={lbl}>Target Platform</label>
              <select style={inp()} value={platform} onChange={e=>setPlatform(e.target.value)}>
                {PLATFORMS.map(p=><option key={p}>{p}</option>)}
              </select>
            </div>

            <div>
              <label style={lbl}>Content Style</label>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:6}}>
                {STYLES.map(s=>(
                  <div key={s} onClick={()=>setStyle(s)} style={{padding:'8px 8px',border:`1px solid ${style===s?'#6c63ff':'#2e2e42'}`,borderRadius:9,fontSize:'0.72rem',fontWeight:500,cursor:'pointer',textAlign:'center',color:style===s?'#6c63ff':'#5a5a72',background:style===s?'rgba(108,99,255,0.12)':'transparent',transition:'all 0.15s',userSelect:'none'}}>
                    {s}
                  </div>
                ))}
              </div>
            </div>

            {/* Batch toggle */}
            <div onClick={()=>setBatch(b=>!b)} style={{display:'flex',alignItems:'center',justifyContent:'space-between',background:'#16161f',border:'1px solid #2e2e42',borderRadius:10,padding:'11px 13px',cursor:'pointer',userSelect:'none'}}>
              <div>
                <div style={{fontSize:'0.83rem',fontWeight:500}}>📅 Batch Mode</div>
                <div style={{fontSize:'0.67rem',color:'#5a5a72',marginTop:2}}>Generate multiple at once</div>
              </div>
              <div style={{width:40,height:22,background:batch?'#6c63ff':'#2e2e42',borderRadius:11,position:'relative',transition:'background 0.2s',flexShrink:0}}>
                <div style={{position:'absolute',width:16,height:16,borderRadius:'50%',background:'white',top:3,left:batch?21:3,transition:'left 0.2s'}}/>
              </div>
            </div>

            {batch && (
              <div style={{display:'flex',alignItems:'center',gap:10}}>
                <span style={{fontSize:'0.83rem',flex:1}}>Number of carousels</span>
                <button onClick={()=>setCount(c=>Math.max(1,c-1))} style={{width:30,height:30,background:'#16161f',border:'1px solid #2e2e42',borderRadius:7,color:'#eeeef5',fontSize:'1.1rem',cursor:'pointer'}}>−</button>
                <span style={{fontWeight:700,color:'#6c63ff',minWidth:24,textAlign:'center'}}>{count}</span>
                <button onClick={()=>setCount(c=>Math.min(7,c+1))} style={{width:30,height:30,background:'#16161f',border:'1px solid #2e2e42',borderRadius:7,color:'#eeeef5',fontSize:'1.1rem',cursor:'pointer'}}>+</button>
              </div>
            )}

            <button onClick={generate} disabled={loading} style={{padding:'13px',background:loading?'rgba(108,99,255,0.35)':'linear-gradient(135deg,#6c63ff,#9b59b6)',border:'none',borderRadius:12,color:'white',fontSize:'0.92rem',fontWeight:700,letterSpacing:'1px',cursor:loading?'not-allowed':'pointer',transition:'all 0.2s',fontFamily:'Syne,sans-serif'}}>
              {loading ? '⏳ GENERATING...' : '⧉ GENERATE CAROUSELS'}
            </button>
          </div>
        </div>

        {/* ── RIGHT PANEL ── */}
        <div style={{display:'flex',flexDirection:'column',gap:20}}>

          {/* Loading */}
          {loading && (
            <div style={{background:'#0e0e16',border:'1px solid #252535',borderRadius:18,padding:'50px 20px',textAlign:'center'}}>
              <div style={{display:'flex',justifyContent:'center',gap:8,marginBottom:20}}>
                {[0,1,2].map(i=>(
                  <div key={i} style={{width:10,height:10,borderRadius:'50%',background:['#6c63ff','#ff6584','#43e97b'][i],animation:`bounce 1.2s infinite ease-in-out`,animationDelay:`${i*0.2}s`}}/>
                ))}
              </div>
              <div style={{color:'#6c63ff',fontWeight:700,marginBottom:16,fontFamily:'Syne,sans-serif'}}>Building carousels...</div>
              <div style={{display:'flex',flexDirection:'column',gap:6,alignItems:'center'}}>
                {LOADING_STEPS.map((s,i)=>(
                  <div key={i} style={{fontSize:'0.76rem',padding:'4px 12px',borderRadius:20,color:i<loadStep?'#43e97b':i===loadStep?'#eeeef5':'#3a3a50',background:i===loadStep?'#16161f':'transparent',transition:'all 0.3s'}}>
                    {i<loadStep?`✓ ${s}`:s}
                  </div>
                ))}
              </div>
            </div>
          )}

          {/* Error */}
          {error && !loading && (
            <div style={{background:'#0e0e16',border:'1px solid #ff658444',borderRadius:18,padding:'40px 20px',textAlign:'center'}}>
              <div style={{fontSize:'2rem',marginBottom:12,opacity:0.5}}>⚠</div>
              <div style={{color:'#ff6584',fontSize:'0.88rem'}}>{error}</div>
            </div>
          )}

          {/* Empty */}
          {!loading && !error && posts.length===0 && (
            <div style={{background:'#0e0e16',border:'1px solid #252535',borderRadius:18,padding:'70px 20px',textAlign:'center'}}>
              <div style={{fontSize:'2.5rem',marginBottom:14,opacity:0.25}}>⧉</div>
              <div style={{color:'#5a5a72',fontSize:'0.9rem',lineHeight:1.7,maxWidth:280,margin:'0 auto'}}>Fill in your business details on the left and click Generate</div>
            </div>
          )}

          {/* Posts */}
          {posts.map((post,pi)=>{
            const th = THEMES[pi % THEMES.length];
            const si = activeSlides[pi]||0;
            const slide = post.slides[si];
            return (
              <div key={pi} className="fadeUp" style={{background:'#0e0e16',border:'1px solid #252535',borderRadius:18,overflow:'hidden',animationDelay:`${pi*0.08}s`}}>

                {/* Post header */}
                <div style={{padding:'13px 18px',borderBottom:'1px solid #252535',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
                  <span style={{fontSize:'0.67rem',color:'#5a5a72',fontFamily:'monospace'}}>Post {pi+1} of {posts.length}</span>
                  <span style={{fontSize:'0.75rem',fontWeight:600,color:th.accent,background:`${th.accent}18`,border:`1px solid ${th.accent}44`,padding:'3px 10px',borderRadius:20}}>{post.topic}</span>
                </div>

                <div style={{padding:18,display:'grid',gridTemplateColumns:isMobile?'1fr':'1fr 250px',gap:18}}>

                  {/* Slides side */}
                  <div>
                    <div style={{fontSize:'0.62rem',fontWeight:700,letterSpacing:'1.5px',textTransform:'uppercase',color:'#5a5a72',marginBottom:10}}>5 Slides — Tap to preview</div>

                    {/* Thumbnails */}
                    <div style={{display:'flex',gap:7,flexWrap:'wrap',marginBottom:14}}>
                      {post.slides.map((sl,sli)=>(
                        <div key={sli} onClick={()=>setActive(a=>({...a,[pi]:sli}))}
                          style={{width:68,height:68,borderRadius:10,overflow:'hidden',cursor:'pointer',border:`2px solid ${sli===si?th.accent:'transparent'}`,boxShadow:sli===si?`0 0 12px ${th.accent}55`:'none',flexShrink:0,transition:'all 0.15s'}}>
                          <div style={{width:'100%',height:'100%',background:th.bg,color:th.text,padding:6,display:'flex',flexDirection:'column'}}>
                            <div style={{fontSize:'0.5rem',color:th.accent,fontFamily:'monospace'}}>{sli+1}</div>
                            <div style={{fontSize:'0.9rem',margin:'2px 0'}}>{sl.emoji}</div>
                            <div style={{fontSize:'0.48rem',fontWeight:700,lineHeight:1.3,overflow:'hidden',display:'-webkit-box',WebkitLineClamp:2,WebkitBoxOrient:'vertical'}}>{sl.title}</div>
                          </div>
                        </div>
                      ))}
                    </div>

                    {/* Big preview */}
                    <div style={{background:th.bg,color:th.text,borderRadius:14,padding:'20px 18px',minHeight:190,display:'flex',flexDirection:'column',gap:8}}>
                      <div style={{fontSize:'0.6rem',color:th.accent,fontFamily:'monospace',opacity:0.7}}>{si+1}/{post.slides.length}</div>
                      <div style={{fontSize:'1.6rem'}}>{slide.emoji}</div>
                      <div style={{fontFamily:'Syne,sans-serif',fontSize:'1rem',fontWeight:800,lineHeight:1.3}}>{slide.title}</div>
                      <div style={{fontSize:'0.82rem',lineHeight:1.65,opacity:0.85,flex:1}}>{slide.body}</div>
                      {slide.cta && <div style={{fontSize:'0.71rem',fontWeight:600,padding:'5px 13px',border:`1px solid ${th.accent}`,color:th.accent,borderRadius:20,alignSelf:'flex-start',marginTop:4}}>{slide.cta}</div>}
                    </div>
                  </div>

                  {/* Caption side */}
                  <div style={{display:'flex',flexDirection:'column',gap:10}}>
                    <div style={{fontSize:'0.62rem',fontWeight:700,letterSpacing:'1.5px',textTransform:'uppercase',color:'#5a5a72'}}>Caption + Hashtags</div>
                    <div style={{background:'#16161f',border:'1px solid #2e2e42',borderRadius:10,padding:12,fontSize:'0.8rem',lineHeight:1.65,whiteSpace:'pre-line',flex:1}}>{post.caption}</div>
                    <div style={{background:'#16161f',border:'1px solid #2e2e42',borderRadius:10,padding:12,fontSize:'0.72rem',color:'#6c63ff',lineHeight:1.9,wordBreak:'break-word'}}>{post.hashtags}</div>
                    <button onClick={()=>copyCaption(pi)} style={{padding:'10px',background:'transparent',border:`1px solid ${copied[pi]?'#43e97b':'#2e2e42'}`,borderRadius:9,color:copied[pi]?'#43e97b':'#5a5a72',fontSize:'0.72rem',fontWeight:700,letterSpacing:'1px',cursor:'pointer',transition:'all 0.2s',fontFamily:'Syne,sans-serif'}}>
                      {copied[pi]?'✓ COPIED!':'⊕ COPY CAPTION'}
                    </button>
                  </div>
                </div>
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
